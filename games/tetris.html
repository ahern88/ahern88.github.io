<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
        }
        .game-container {
            display: flex;
            gap: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        canvas {
            border: 3px solid #4a9eff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.5);
        }
        .info-panel {
            color: #fff;
            min-width: 200px;
        }
        .info-panel h2 {
            margin-bottom: 20px;
            color: #4a9eff;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }
        .score-box, .level-box, .lines-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #4a9eff;
        }
        .score-box h3, .level-box h3, .lines-box h3 {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }
        .score-box p, .level-box p, .lines-box p {
            font-size: 24px;
            font-weight: bold;
        }
        .controls {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .controls h3 {
            color: #4a9eff;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .controls p {
            font-size: 12px;
            color: #aaa;
            margin: 5px 0;
        }
        .btn {
            background: linear-gradient(135deg, #4a9eff 0%, #0066cc 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(74, 158, 255, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            color: white;
            display: none;
            z-index: 100;
        }
        .game-over h2 {
            color: #ff4a4a;
            margin-bottom: 20px;
        }
        .game-over p {
            margin-bottom: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="300" height="600"></canvas>
        <div class="info-panel">
            <h2>🎮 俄罗斯方块</h2>
            <div class="score-box">
                <h3>得分</h3>
                <p id="score">0</p>
            </div>
            <div class="level-box">
                <h3>等级</h3>
                <p id="level">1</p>
            </div>
            <div class="lines-box">
                <h3>消除行数</h3>
                <p id="lines">0</p>
            </div>
            <div class="controls">
                <h3>操作说明</h3>
                <p>← → 左右移动</p>
                <p>↑ 旋转</p>
                <p>↓ 加速下落</p>
                <p>空格 直接掉落</p>
            </div>
            <button class="btn" id="startBtn" onclick="startGame()">开始游戏</button>
        </div>
    </div>
    <div class="game-over" id="gameOver">
        <h2>游戏结束</h2>
        <p>最终得分：<span id="finalScore">0</span></p>
        <button class="btn" onclick="startGame()">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        
        const SHAPES = [
            [[1, 1, 1, 1]], // I
            [[1, 1], [1, 1]], // O
            [[0, 1, 0], [1, 1, 1]], // T
            [[1, 0, 0], [1, 1, 1]], // L
            [[0, 0, 1], [1, 1, 1]], // J
            [[0, 1, 1], [1, 1, 0]], // S
            [[1, 1, 0], [0, 1, 1]]  // Z
        ];
        
        const COLORS = [
            '#00f0f0', '#f0f000', '#a000f0', '#f0a000',
            '#0000f0', '#00f000', '#f00000'
        ];
        
        let board = [];
        let currentPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameLoop = null;
        let isGameOver = false;
        
        function createBoard() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        }
        
        function createPiece() {
            const shapeIndex = Math.floor(Math.random() * SHAPES.length);
            return {
                shape: SHAPES[shapeIndex],
                color: COLORS[shapeIndex],
                x: Math.floor(COLS / 2) - Math.floor(SHAPES[shapeIndex][0].length / 2),
                y: 0
            };
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * BLOCK_SIZE, 0);
                ctx.lineTo(x * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * BLOCK_SIZE);
                ctx.lineTo(canvas.width, y * BLOCK_SIZE);
                ctx.stroke();
            }
            
            // Draw board
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        drawBlock(x, y, board[y][x]);
                    }
                }
            }
            
            // Draw current piece
            if (currentPiece) {
                currentPiece.shape.forEach((row, dy) => {
                    row.forEach((value, dx) => {
                        if (value) {
                            drawBlock(currentPiece.x + dx, currentPiece.y + dy, currentPiece.color);
                        }
                    });
                });
            }
        }
        
        function drawBlock(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, 5);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + BLOCK_SIZE - 6, BLOCK_SIZE - 2, 5);
        }
        
        function collision(piece, offsetX = 0, offsetY = 0) {
            return piece.shape.some((row, dy) => {
                return row.some((value, dx) => {
                    if (!value) return false;
                    const newX = piece.x + dx + offsetX;
                    const newY = piece.y + dy + offsetY;
                    return newX < 0 || newX >= COLS || newY >= ROWS || (newY >= 0 && board[newY][newX]);
                });
            });
        }
        
        function merge() {
            currentPiece.shape.forEach((row, dy) => {
                row.forEach((value, dx) => {
                    if (value && currentPiece.y + dy >= 0) {
                        board[currentPiece.y + dy][currentPiece.x + dx] = currentPiece.color;
                    }
                });
            });
        }
        
        function clearLines() {
            let linesCleared = 0;
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    y++;
                }
            }
            if (linesCleared > 0) {
                const points = [0, 100, 300, 500, 800];
                score += points[linesCleared] * level;
                lines += linesCleared;
                level = Math.floor(lines / 10) + 1;
                updateInfo();
            }
        }
        
        function updateInfo() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }
        
        function rotate() {
            const rotated = currentPiece.shape[0].map((_, i) =>
                currentPiece.shape.map(row => row[i]).reverse()
            );
            const previousShape = currentPiece.shape;
            currentPiece.shape = rotated;
            if (collision(currentPiece)) {
                currentPiece.shape = previousShape;
            }
        }
        
        function moveDown() {
            if (!collision(currentPiece, 0, 1)) {
                currentPiece.y++;
            } else {
                merge();
                clearLines();
                currentPiece = createPiece();
                if (collision(currentPiece)) {
                    gameOver();
                }
            }
        }
        
        function hardDrop() {
            while (!collision(currentPiece, 0, 1)) {
                currentPiece.y++;
                score += 2;
            }
            moveDown();
            updateInfo();
        }
        
        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function startGame() {
            createBoard();
            currentPiece = createPiece();
            score = 0;
            level = 1;
            lines = 0;
            isGameOver = false;
            updateInfo();
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('startBtn').textContent = '重新开始';
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(() => {
                if (!isGameOver) {
                    moveDown();
                    draw();
                }
            }, 1000 - (level - 1) * 100);
            
            draw();
        }
        
        document.addEventListener('keydown', (e) => {
            if (isGameOver || !currentPiece) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    if (!collision(currentPiece, -1, 0)) currentPiece.x--;
                    break;
                case 'ArrowRight':
                    if (!collision(currentPiece, 1, 0)) currentPiece.x++;
                    break;
                case 'ArrowDown':
                    moveDown();
                    score += 1;
                    updateInfo();
                    break;
                case 'ArrowUp':
                    rotate();
                    break;
                case ' ':
                    hardDrop();
                    break;
            }
            if (!isGameOver) draw();
            e.preventDefault();
        });
        
        // Initial draw
        createBoard();
        draw();
    </script>
</body>
</html>
